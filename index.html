<!DOCTYPE html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS Master Pro - Kitchen Display System</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Sarabun', sans-serif; }
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .urgent-blink { animation: blink-shadow 1s infinite alternate; border: 4px solid #ef4444 !important; }
        @keyframes blink-shadow { from { box-shadow: 0 0 10px #ef4444; } to { box-shadow: 0 0 30px #ef4444; } }
        .tab-active { color: #f97316; border-bottom: 4px solid #f97316; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pop-in { animation: popIn 0.2s ease-out forwards; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Accordion */
        .details-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-in-out; opacity: 0; }
        .order-row.active .details-content { max-height: 1000px; opacity: 1; padding-top: 1rem; padding-bottom: 1rem; }
        .chevron-icon { transition: transform 0.3s; }
        .order-row.active .chevron-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="h-full bg-slate-900 text-slate-100 overflow-hidden">

    <div id="confirm-popup" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl pop-in text-center">
            <div class="w-20 h-20 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">👨‍🍳</div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">เรียบร้อยแล้วใช่ไหม?</h3>
            <p class="text-slate-500 mb-8 font-medium">ยืนยันเมื่ออาหารจานนี้พร้อมเสิร์ฟ</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmPopup(false)" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold active:scale-95 transition-all">ยังก่อน</button>
                <button id="btn-final-confirm" onclick="closeConfirmPopup(true)" class="flex-1 py-4 bg-orange-500 text-white rounded-2xl font-black shadow-lg shadow-orange-200 active:scale-95 transition-all">เสร็จแล้ว!</button>
            </div>
        </div>
    </div>

    <div class="h-full flex flex-col">
        <header class="bg-slate-800 border-b border-slate-700 shadow-xl">
            <div class="px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-orange-500 flex items-center justify-center text-xl shadow-lg">👨‍🍳</div>
                    <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">Kitchen Master</h1>
                </div>
                <div id="sync-status" class="text-[10px] font-bold text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20 uppercase tracking-widest">
                    Live Syncing (5s)
                </div>
            </div>
            
            <div class="flex px-6 gap-6 md:gap-12 overflow-x-auto no-scrollbar">
                <button onclick="switchTab('new')" id="tab-new" class="pb-3 text-sm font-black tracking-widest tab-active whitespace-nowrap transition-all">
                    รายการใหม่ <span id="badge-new" class="ml-1 bg-red-500 text-white text-[10px] px-2 rounded-full">0</span>
                </button>
                <button onclick="switchTab('prep')" id="tab-prep" class="pb-3 text-sm font-black tracking-widest text-slate-400 whitespace-nowrap transition-all">
                    กำลังเตรียม <span id="badge-prep" class="ml-1 bg-orange-500 text-white text-[10px] px-2 rounded-full">0</span>
                </button>
                <button onclick="switchTab('done')" id="tab-done" class="pb-3 text-sm font-black tracking-widest text-slate-400 whitespace-nowrap transition-all">
                    ทำเสร็จแล้ว <span id="badge-done" class="ml-1 bg-emerald-500 text-white text-[10px] px-2 rounded-full">0</span>
                </button>
                <button onclick="switchTab('menu')" id="tab-menu" class="pb-3 text-sm font-black tracking-widest text-slate-400 whitespace-nowrap transition-all">
                    จัดการเมนู 🍔
                </button>
            </div>
        </header>

        <main class="flex-1 relative overflow-hidden">
            <div id="sec-new" class="h-full overflow-x-auto p-6 flex gap-6 items-start"></div>
            <div id="sec-prep" class="h-full overflow-x-auto p-6 flex gap-6 items-start hidden"></div>
            <div id="sec-done" class="h-full overflow-y-auto p-6 hidden">
                <div id="done-list-container" class="max-w-4xl mx-auto space-y-4 pb-10"></div>
            </div>
            <div id="sec-menu" class="h-full overflow-y-auto p-6 hidden">
                <div class="max-w-5xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-black text-white">จัดการรายการอาหาร</h2>
                        <button onclick="openMenuModal()" class="bg-orange-500 hover:bg-orange-400 text-white px-6 py-2 rounded-xl font-bold transition-all shadow-lg">
                            + เพิ่มเมนูใหม่
                        </button>
                    </div>
                    <div class="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden shadow-2xl">
                        <table class="w-full text-left">
                            <thead class="bg-slate-700 text-xs text-slate-400 uppercase tracking-widest">
                                <tr>
                                    <th class="p-5">รูป</th>
                                    <th class="p-5">ชื่อเมนู</th>
                                    <th class="p-5">ราคา</th>
                                    <th class="p-5 text-center">สถานะ</th>
                                    <th class="p-5 text-right">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="admin-menu-list" class="divide-y divide-slate-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="menu-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl pop-in">
            <h3 id="modal-title" class="text-2xl font-black text-slate-800 mb-6">จัดการข้อมูลเมนู</h3>
            <form id="menu-form" class="space-y-4">
                <input type="hidden" id="edit-id">
                
                <div class="flex justify-center mb-2">
                    <div id="preview-box" class="w-32 h-32 bg-slate-100 rounded-3xl border-2 border-dashed border-slate-300 flex items-center justify-center overflow-hidden relative">
                        <img id="img-preview" src="" class="hidden w-full h-full object-cover">
                        <span id="preview-text" class="text-slate-400 text-xs font-bold uppercase">No Image</span>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">ชื่ออาหาร</label>
                    <input type="text" id="menu-name" class="w-full p-4 bg-slate-100 rounded-2xl text-slate-800 font-bold outline-none border-2 border-transparent focus:border-orange-500 transition-all" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">ราคา (บาท)</label>
                    <input type="number" id="menu-price" class="w-full p-4 bg-slate-100 rounded-2xl text-slate-800 font-bold outline-none border-2 border-transparent focus:border-orange-500 transition-all" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">อัปโหลดรูปภาพ</label>
                    <input type="file" id="menu-file" accept="image/*" class="w-full p-2 text-slate-500 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-orange-500 file:text-white hover:file:bg-orange-600 transition-all">
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeMenuModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold active:scale-95 transition-all">ยกเลิก</button>
                    <button type="submit" id="menu-save-btn" class="flex-1 py-4 bg-orange-500 text-white rounded-2xl font-black shadow-lg active:scale-95 transition-all">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbztypqVeKdZHc6MBDBjP-S8G3ZtObFgUcWkJxcgU-ElsQyupKSBu-yz9TZ3V93W5VFM/exec';
    
    let pendingOrders = [];
    let historyOrders = [];
    let prepIds = JSON.parse(localStorage.getItem('prepIds')) || [];
    let alarmInterval = null;
    let confirmResolver = null;
    let currentBase64 = ""; // เก็บค่ารูปภาพ

    // --- UI Logic ---
    function toggleOrderRow(el) { el.classList.toggle('active'); }

    function switchTab(tab) {
        ['sec-new', 'sec-prep', 'sec-done', 'sec-menu'].forEach(s => document.getElementById(s).classList.add('hidden'));
        ['tab-new', 'tab-prep', 'tab-done', 'tab-menu'].forEach(t => document.getElementById(t).classList.remove('tab-active', 'text-slate-400'));
        document.getElementById('sec-' + tab).classList.remove('hidden');
        document.getElementById('tab-' + tab).classList.add('tab-active');
        if(tab === 'done') fetchHistory();
        if(tab === 'menu') fetchAdminMenu();
        renderAll();
    }

    // --- File Handling ---
    document.getElementById('menu-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                currentBase64 = event.target.result;
                const preview = document.getElementById('img-preview');
                preview.src = currentBase64;
                preview.classList.remove('hidden');
                document.getElementById('preview-text').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }
    });

    // --- Data Fetching ---
    async function fetchOrders() {
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getPendingOrders' }) });
            const result = await res.json();
            if(result.success) { 
                pendingOrders = result.data; 
                renderAll(); 
                checkAlarm(); 
                document.getElementById('sync-status').innerText = "Live Syncing (5s)";
            }
        } catch (e) { document.getElementById('sync-status').innerText = "Sync Error!"; }
    }

    async function fetchHistory() {
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getSalesHistory' }) });
            const result = await res.json();
            if(result.success) { historyOrders = result.data; renderHistory(); }
        } catch (e) { console.error("History fail"); }
    }

    async function fetchAdminMenu() {
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getProducts' }) });
            const result = await res.json();
            if(result.success) renderAdminMenu(result.data);
        } catch (e) { console.error("Menu fail"); }
    }

    // --- Rendering ---
    function renderAll() {
        const newO = pendingOrders.filter(o => !prepIds.includes(o.id));
        const prepO = pendingOrders.filter(o => prepIds.includes(o.id));
        document.getElementById('badge-new').innerText = newO.length;
        document.getElementById('badge-prep').innerText = prepO.length;
        
        document.getElementById('sec-new').innerHTML = newO.length ? newO.map(o => renderCard(o, true)).join('') : '<div class="w-full text-center py-20 text-slate-700 font-bold">ไม่มีรายการใหม่</div>';
        document.getElementById('sec-prep').innerHTML = prepO.length ? prepO.map(o => renderCard(o, false)).join('') : '<div class="w-full text-center py-20 text-slate-700 font-bold">ไม่มีรายการที่กำลังเตรียม</div>';
    }

    function renderCard(order, isNew) {
        const items = JSON.parse(order.items);
        return `
            <div class="order-card w-80 flex-shrink-0 bg-slate-800 rounded-[2.5rem] border-2 ${isNew ? 'urgent-blink border-red-500' : 'border-slate-700'} flex flex-col overflow-hidden shadow-2xl">
                <div class="p-5 ${isNew ? 'bg-red-500/20' : 'bg-orange-500/10'}">
                    <h4 class="text-2xl font-black text-white">${order.orderType || '0000'}</h4>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${new Date(order.timestamp).toLocaleTimeString('th-TH')}</p>
                </div>
                <div class="flex-1 p-5 space-y-2">
                    ${items.map(i => `<div class="flex justify-between items-center text-sm font-bold"><span>${i.name}</span><span class="text-orange-500 font-black">x${i.qty}</span></div>`).join('')}
                </div>
                <div class="p-5 pt-0">
                    <button onclick="${isNew ? `moveToPrep('${order.id}')` : `executeComplete('${order.id}', this)`}" class="w-full py-4 ${isNew ? 'bg-red-600' : 'bg-orange-600'} text-white rounded-2xl font-black shadow-lg active:scale-95 transition-all disabled:opacity-50">
                        ${isNew ? '🔔 รับออเดอร์' : '👨‍🍳 ทำเสร็จแล้ว'}
                    </button>
                </div>
            </div>`;
    }

    function renderHistory() {
        const container = document.getElementById('done-list-container');
        document.getElementById('badge-done').innerText = historyOrders.length;
        container.innerHTML = historyOrders.length ? historyOrders.slice().reverse().map(o => {
            const items = JSON.parse(o.items || '[]');
            return `
            <div class="order-row bg-slate-800 rounded-[2rem] border border-slate-700 shadow-lg cursor-pointer overflow-hidden transition-all" onclick="toggleOrderRow(this)">
                <div class="p-6 flex justify-between items-center hover:bg-slate-700/30 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-emerald-500/20 text-emerald-500 rounded-full flex items-center justify-center text-xl">✅</div>
                        <div>
                            <h4 class="text-xl font-black text-white">${o.orderType}</h4>
                            <p class="text-xs text-slate-500">${new Date(o.timestamp).toLocaleString('th-TH')}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-right">
                            <p class="text-xl font-black text-white">฿${parseFloat(o.total).toLocaleString()}</p>
                            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">แตะดูรายละเอียด</span>
                        </div>
                        <div class="chevron-icon text-slate-500">
                             <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                    </div>
                </div>
                <div class="details-content bg-slate-900/40 px-8">
                    <div class="border-t border-slate-700/50 py-4 space-y-3">
                        ${items.map(item => `
                            <div class="flex justify-between items-center">
                                <span class="text-slate-300 font-medium">${item.name}</span>
                                <div class="flex items-center gap-6">
                                    <span class="text-slate-500 font-bold">x${item.qty}</span>
                                    <span class="text-white font-black w-20 text-right">฿${(item.price * item.qty).toLocaleString()}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }).join('') : '<div class="text-center py-20 text-slate-600 font-bold">ไม่มีประวัติวันนี้</div>';
    }

    function renderAdminMenu(data) {
        document.getElementById('admin-menu-list').innerHTML = data.map(p => `
            <tr class="hover:bg-slate-700/30 transition-all">
                <td class="p-5">
                    <img src="${p.image || 'https://placehold.co/100'}" class="w-12 h-12 rounded-xl object-cover border border-slate-600 bg-slate-700" onerror="this.src='https://placehold.co/100?text=No+Img'">
                </td>
                <td class="p-5 font-bold text-white">${p.name}</td>
                <td class="p-5 text-orange-400 font-black">฿${p.price}</td>
                <td class="p-5 text-center">
                    <button onclick="toggleProductStatus('${p.id}', '${p.status}', this)" class="px-3 py-1 rounded-full text-[10px] font-black uppercase transition-all ${p.status === 'active' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50' : 'bg-red-500/20 text-red-400 border border-red-500/50'}">
                        ${p.status === 'active' ? '● กำลังขาย' : '○ ปิดรายการ'}
                    </button>
                </td>
                <td class="p-5 text-right space-x-3 text-sm">
                    <button onclick="editProduct('${p.id}', '${p.name}', ${p.price}, '${p.image}')" class="text-slate-400 hover:text-white font-bold transition-colors">แก้ไข</button>
                    <button onclick="deleteProduct('${p.id}', this)" class="text-red-400 hover:text-red-300 font-bold transition-colors">ลบ</button>
                </td>
            </tr>`).join('');
    }

    // --- Actions ---
    function moveToPrep(id) { 
        prepIds.push(id); 
        localStorage.setItem('prepIds', JSON.stringify(prepIds)); 
        renderAll(); checkAlarm(); 
    }

    async function executeComplete(id, btn) {
        const confirmed = await showNiceConfirm();
        if(!confirmed) return;
        btn.disabled = true;
        btn.innerText = "Saving...";
        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'completeOrder', id }) });
            pendingOrders = pendingOrders.filter(o => o.id !== id);
            prepIds = prepIds.filter(i => i !== id);
            localStorage.setItem('prepIds', JSON.stringify(prepIds));
            renderAll();
        } catch(e) { btn.disabled = false; }
    }

    async function toggleProductStatus(id, s, btn) {
        btn.innerText = "...";
        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'updateProductStatus', id, status: s === 'active' ? 'inactive' : 'active' }) });
            setTimeout(fetchAdminMenu, 1000);
        } catch(e) {}
    }

    async function deleteProduct(id, btn) {
        if(!confirm('ลบถาวร?')) return;
        btn.innerText = "Deleting...";
        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteProduct', id }) });
            setTimeout(fetchAdminMenu, 1000);
        } catch(e) {}
    }

    // --- Modal & Form ---
    function openMenuModal() { document.getElementById('menu-modal').classList.remove('hidden'); }
    function closeMenuModal() { 
        document.getElementById('menu-modal').classList.add('hidden'); 
        document.getElementById('menu-form').reset();
        document.getElementById('edit-id').value = '';
        document.getElementById('img-preview').classList.add('hidden');
        document.getElementById('preview-text').classList.remove('hidden');
        currentBase64 = "";
    }

    document.getElementById('menu-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('menu-save-btn');
        const id = document.getElementById('edit-id').value || 'P-' + Date.now();
        btn.disabled = true; btn.innerText = "Saving...";

        const data = {
            action: document.getElementById('edit-id').value ? 'editProduct' : 'addProduct',
            id: id,
            name: document.getElementById('menu-name').value,
            price: document.getElementById('menu-price').value,
            image: currentBase64 // ส่งรูป Base64
        };

        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            closeMenuModal(); 
            setTimeout(fetchAdminMenu, 1000);
        } catch(e) { alert("Error!"); } finally { btn.disabled = false; btn.innerText = "บันทึก"; }
    }

    function editProduct(id, n, p, i) {
        document.getElementById('edit-id').value = id;
        document.getElementById('menu-name').value = n;
        document.getElementById('menu-price').value = p;
        if(i && i !== 'null' && i !== 'undefined') {
            const preview = document.getElementById('img-preview');
            preview.src = i;
            preview.classList.remove('hidden');
            document.getElementById('preview-text').classList.add('hidden');
            currentBase64 = i;
        }
        openMenuModal();
    }

    function showNiceConfirm() {
        document.getElementById('confirm-popup').classList.remove('hidden');
        return new Promise((r) => { confirmResolver = r; });
    }

    function closeConfirmPopup(res) {
        document.getElementById('confirm-popup').classList.add('hidden');
        if(confirmResolver) confirmResolver(res);
    }

    function checkAlarm() {
        const hasNew = pendingOrders.some(o => !prepIds.includes(o.id));
        if(hasNew && !alarmInterval) {
            alarmInterval = setInterval(() => document.getElementById('notif-sound').play().catch(()=>{}), 3000);
        } else if(!hasNew && alarmInterval) {
            clearInterval(alarmInterval); alarmInterval = null;
        }
    }

    // Init
    setInterval(fetchOrders, 5000);
    window.onload = () => { fetchOrders(); fetchHistory(); };
    window.onclick = () => { 
        document.getElementById('notif-sound').play().then(() => document.getElementById('notif-sound').pause()).catch(()=>{}); 
        window.onclick = null; 
    };
</script>
</body>
</html>
